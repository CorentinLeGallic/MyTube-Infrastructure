services:
  database:
    ports:
      - "5432:5432"

  backend:
    build:
      target: dev
    ports:
      - "8000:8000"
    develop:
      watch:
        - path: ../backend/src
          target: /app/src
          action: sync
        - path: ../backend/package.json
          action: rebuild
        - path: ../backend/package-lock.json
          action: rebuild

  frontend:
    build:
      target: dev
    ports:
      - "3000:3000"
    develop:
      watch:
        - path: ../frontend/src
          target: /app/src
          action: sync
        - path: ../frontend/package.json
          action: rebuild
        - path: ../frontend/package-lock.json
          action: rebuild