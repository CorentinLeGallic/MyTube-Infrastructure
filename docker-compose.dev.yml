services:
  database:
    ports:
      - "5432:5432"

  backend:
    build:
      target: dev
    ports:
      - "8000:8000"
    env_file: ../backend/.env
    volumes:
      - ../backend/src:/app/src
      - ../backend/prisma:/app/prisma

  frontend:
    build:
      target: dev
    ports:
      - "3000:3000"
    env_file: ../frontend/.env
    volumes:
      - ../frontend/src:/app/src